<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>

    <script src="https://cdn.jsdelivr.net/npm/quagga@0.10.1/dist/quagga.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #020617;
            color: white;
            font-family: sans-serif;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 20;
        }

        .title {
            font-size: 14px;
            color: #22d3ee;
            font-weight: bold;
        }

        .close-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        /* SCANNER */
        #reader {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="title">SCAN BARCODE</div>
        <button class="close-btn" onclick="closeScanner()">✕</button>
    </div>

    <div id="reader"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('target');

        let isScanning = false;

        // AUTO START
        window.addEventListener('load', startScanning);

        function startScanning() {

            const config = {
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector("#reader"),
                    constraints: {
                        facingMode: "environment",
                        width: { min: 640 },
                        height: { min: 480 }
                    }
                },
                locator: {
                    patchSize: "medium",
                    halfSample: true
                },
                numOfWorkers: 2,
                decoder: {
                    readers: [
                        "code_128_reader",
                        "ean_reader",
                        "ean_8_reader",
                        "upc_reader",
                        "upc_e_reader",
                        "code_39_reader",
                        "code_93_reader"
                    ]
                },
                locate: true
            };

            Quagga.init(config, function (err) {
                if (err) {
                    console.error("❌ Quagga error:", err);
                    alert("❌ Gagal akses kamera");
                    return;
                }

                console.log("✅ Quagga started");
                isScanning = true;
                Quagga.start();
            });

            Quagga.onDetected(function (result) {
                if (!isScanning) return;

                if (!result.codeResult || !result.codeResult.code) return;

                const code = result.codeResult.code;
                console.log("✅ SCAN:", code);

                isScanning = false;

                if (window.opener) {
                    window.opener.postMessage({
                        type: "SCAN_RESULT",
                        text: code,
                        targetId: targetId || null
                    }, "*");
                }

                if (navigator.vibrate) navigator.vibrate(200);

                Quagga.stop();

                setTimeout(() => {
                    window.close();
                }, 500);
            });
        }

        // CLOSE BUTTON
        function closeScanner() {
            if (isScanning) {
                Quagga.stop();
            }
            window.close();
        }
    </script>

</body>

</html>
