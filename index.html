<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/quagga@0.10.1/dist/quagga.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #0b1220;
            color: white;
        }

        /* TOP BAR */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            background: #0f172a;
            border-bottom: 1px solid #1f2937;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        button {
            border: none;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn {
            background: #1f2937;
            color: white;
        }

        .btn.active {
            background: #06b6d4;
            color: black;
        }

        .close {
            background: #ef4444;
            color: white;
        }

        /* SCANNER AREA */
        #scanner {
            position: fixed;
            top: 56px;
            bottom: 0;
            left: 0;
            right: 0;
        }

        /* CENTER BOX */
        .box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 260px;
            height: 140px;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            pointer-events: none;
        }

        /* RESULT */
        .result {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: #111827;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            word-break: break-all;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="title">Scanner</div>

        <div class="actions">
            <button id="qrBtn" class="btn active">QR</button>
            <button id="barBtn" class="btn">BARCODE</button>
            <button id="closeBtn" class="close">✕</button>
        </div>
    </div>

    <div id="scanner"></div>
    <div class="box"></div>
    <div class="result" id="result">Menunggu scan...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get("target");

        let mode = "qr";
        let qrScanner = null;
        let lastCode = null;
        let isRunning = false;

        /* SWITCH MODE */
        function setMode(m) {
            console.log('setMode ->', m);
            if (m === mode) return; // Already in this mode
            mode = m;

            document.getElementById("qrBtn").classList.remove("active");
            document.getElementById("barBtn").classList.remove("active");

            if (m === "qr") document.getElementById("qrBtn").classList.add("active");
            else document.getElementById("barBtn").classList.add("active");

            stopAll();
            
            // Longer delay for proper cleanup
            setTimeout(() => {
                startScanner();
            }, 500);
        }

        /* STOP ALL */
        function stopAll() {
            console.log('Stopping all scanners...');
            
            // Stop html5-qrcode
            if (qrScanner) {
                try { 
                    qrScanner.stop().catch(() => {});
                    qrScanner.clear().catch(() => {});
                    console.log('html5-qrcode stopped');
                } catch (e) { 
                    console.warn('qrScanner stop error:', e);
                }
                qrScanner = null;
            }
            
            // Stop Quagga
            if (typeof Quagga !== "undefined") {
                try { 
                    Quagga.offDetected();
                    Quagga.stop(); 
                    console.log('Quagga stopped');
                } catch (e) { 
                    console.warn('Quagga stop error:', e);
                }
            }
            isRunning = false;
        }

        window.addEventListener("load", startScanner);

        function startScanner() {
            console.log('startScanner called, mode:', mode);
            stopAll();
            lastCode = null;

            // Clear scanner div completely
            const scannerDiv = document.getElementById("scanner");
            scannerDiv.innerHTML = '';
            
            // Reset result message
            document.getElementById("result").innerText = "Menunggu scan...";

            // Give a moment for cleanup
            setTimeout(() => {
                if (mode === "qr") startQR();
                else startBarcode();
            }, 100);
        }

        /* QR MODE */
        function startQR() {
            console.log('Starting QR mode with html5-qrcode...');
            
            qrScanner = new Html5Qrcode("scanner");
            
            Html5Qrcode.getCameras()
                .then(devices => {
                    if (!devices || devices.length === 0) {
                        document.getElementById("result").innerText = "Kamera tidak ditemukan";
                        return;
                    }

                    qrScanner.start(
                        { facingMode: "environment" },
                        { fps: 10, qrbox: 250 },
                        (decodedText) => {
                            console.log('QR detected:', decodedText);
                            handleResult(decodedText);
                        },
                        () => {} // ignore errors
                    );
                    isRunning = true;
                    console.log('QR scanner started');
                })
                .catch(err => {
                    console.error('QR getCameras error:', err);
                    document.getElementById("result").innerText = "Error: " + err.message;
                });
        }

        /* BARCODE MODE */
        function startBarcode() {
            console.log('Starting Barcode mode with Quagga...');

            const config = {
                inputStream: {
                    type: "LiveStream",
                    target: document.getElementById("scanner"),
                    constraints: {
                        width: { min: 640 },
                        height: { min: 480 },
                        facingMode: "environment"
                    }
                },
                decoder: {
                    readers: [
                        "ean_reader",
                        "ean_8_reader", 
                        "code_128_reader",
                        "upc_reader",
                        "code_39_reader"
                    ]
                }
            };

            Quagga.init(config, function (err) {
                if (err) {
                    console.error("Barcode init error:", err);
                    document.getElementById("result").innerText = "Barcode Error: " + err.message;
                    return;
                }

                console.log('Barcode initialized, starting...');
                Quagga.start();
                isRunning = true;

                Quagga.onDetected(function (res) {
                    if (!isRunning || !res || !res.codeResult) return;
                    const code = res.codeResult.code;
                    if (code) {
                        console.log('Barcode detected:', code);
                        handleResult(code);
                    }
                });
            });
        }

        /* RESULT HANDLER */
        function handleResult(code) {
            if (code === lastCode) return;
            lastCode = code;

            console.log('Result received:', code);
            document.getElementById("result").innerText = "✅ " + code;

            if (window.opener) {
                window.opener.postMessage({
                    type: "SCAN_RESULT",
                    text: code,
                    targetId: targetId || null,
                    mode: mode
                }, "*");
            }

            if (navigator.vibrate) navigator.vibrate(150);

            // Auto close after delay
            setTimeout(() => {
                try {
                    window.close();
                } catch (e) {
                    console.warn('window.close() failed');
                }
            }, 800);
        }

        /* CLOSE */
        function closeScanner() {
            console.log('closeScanner -> called');
            stopAll();
            
            try {
                window.close();
                console.log('window.close() succeeded');
            } catch (e) {
                console.warn('window.close failed:', e);
                document.getElementById("result").innerText = "⚠️ Tekan tombol BACK untuk keluar";
            }
        }

        // Attach robust event listeners in case inline handlers fail
        (function attachActions(){
            try {
                const q = document.getElementById('qrBtn');
                const b = document.getElementById('barBtn');
                const c = document.getElementById('closeBtn');
                if (q) q.addEventListener('click', () => { console.log('qrBtn click'); setMode('qr'); });
                if (b) b.addEventListener('click', () => { console.log('barBtn click'); setMode('barcode'); });
                if (c) c.addEventListener('click', () => { console.log('closeBtn click'); closeScanner(); });
            } catch (e) { console.warn('attachActions error', e); }
        })();
    </script>

</body>

</html>
