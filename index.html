<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body { margin:0; background:black; color:white; font-family:sans-serif;}
#reader { width:100%; height:70vh;}
#result {
  padding:20px;
  font-size:18px;
  text-align:center;
  background:#111;
}
</style>
</head>

<body>

<div id="reader"></div>
<div id="result">MENUNGGU SCAN...</div>

<script>
const resultBox = document.getElementById("result");

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (!devices.length) {
    resultBox.innerText = "❌ Kamera tidak ditemukan";
    return;
  }

  html5QrCode.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: 250,
      formatsToSupport: [
        Html5QrcodeSupportedFormats.QR_CODE,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8
      ]
    },

    (decodedText, decodedResult) => {
      resultBox.innerText = "✅ TERBACA: " + decodedText;
      console.log(decodedText);
    },

    (err) => {
      // tampilkan sedikit error biar kelihatan kerja
      resultBox.innerText = "Scanning...";
    }
  );

}).catch(err => {
  resultBox.innerText = "❌ Error kamera: " + err;
});
</script>

</body>
</html>
