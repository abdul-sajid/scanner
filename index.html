<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>

    <!-- Quagga2 -->
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #020617;
            color: white;
            font-family: sans-serif;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .title {
            font-size: 14px;
            color: #22d3ee;
            font-weight: bold;
        }

        .close-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 18px;
        }

        /* SCANNER */
        #reader {
            position: absolute;
            top: 60px;
            bottom: 0;
            left: 0;
            right: 0;
        }

        /* FOCUS BOX */
        .scan-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 260px;
            height: 120px;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(34, 211, 238, 0.6);
            border-radius: 12px;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="title">SCAN BARCODE</div>
        <button class="close-btn" onclick="closeScanner()">✕</button>
    </div>

    <div id="reader"></div>
    <div class="scan-box"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('target');

        let isScanning = false;
        let lastResult = null;

        // AUTO START
        window.addEventListener('load', startScanner);

        function startScanner() {

            const config = {
                inputStream: {
                    type: "LiveStream",
                    target: document.querySelector("#reader"),
                    constraints: {
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                },

                locator: {
                    patchSize: "large",
                    halfSample: false
                },

                numOfWorkers: navigator.hardwareConcurrency || 4,
                frequency: 10,

                decoder: {
                    readers: [
                        "ean_reader",
                        "ean_8_reader",
                        "upc_reader",
                        "upc_e_reader",
                        "code_128_reader"
                    ]
                },

                locate: true
            };

            Quagga.init(config, function (err) {
                if (err) {
                    console.error("❌ INIT ERROR:", err);
                    alert("❌ Kamera gagal");
                    return;
                }

                console.log("✅ Scanner ready");
                isScanning = true;
                Quagga.start();
            });

            Quagga.onDetected(function (result) {

                if (!isScanning) return;

                const code = result.codeResult.code;

                // anti double scan
                if (code === lastResult) return;
                lastResult = code;

                console.log("✅ DETECT:", code);

                isScanning = false;

                if (window.opener) {
                    window.opener.postMessage({
                        type: "SCAN_RESULT",
                        text: code,
                        targetId: targetId || null
                    }, "*");
                }

                if (navigator.vibrate) navigator.vibrate(200);

                Quagga.stop();

                setTimeout(() => window.close(), 500);
            });
        }

        // CLOSE BUTTON
        function closeScanner() {
            if (isScanning) {
                Quagga.stop();
            }
            window.close();
        }
    </script>

</body>

</html>
