<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>

    <script src="https://cdn.jsdelivr.net/npm/quagga@0.10.1/dist/quagga.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #020617;
            color: white;
            font-family: sans-serif;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 20;
        }

        .title {
            font-size: 14px;
            color: #22d3ee;
            font-weight: bold;
        }

        .close-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        /* SCANNER */
        #reader {
            width: 100%;
            height: 100vh;
            /* padding-top: 60px; */
            box-sizing: border-box;
        }

        /* PERMISSION */
        .overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #020617;
            z-index: 30;
        }

        button.start-btn {
            padding: 15px 20px;
            border: none;
            background: #06b6d4;
            color: white;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <div class="title">SCAN QR / BARCODE</div>
        <button class="close-btn" onclick="closeScanner()">✕</button>
    </div>

    <!-- SCANNER -->
    <div id="reader"></div>

    <!-- PERMISSION -->
    <div id="permission" class="overlay" style="display: none;">
        <button class="start-btn" onclick="startScanning()">IZINKAN & MULAI</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('target');

        let scanner;
        let isScanning = false;

        // AUTO-START saat halaman dimuat
        window.addEventListener('load', () => {
            startScanning();
        });

        // START SCAN
        function startScanning() {
            document.getElementById("permission").style.display = "none";

            const config = {
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector("#reader"),
                    constraints: {
                        facingMode: "environment",
                        width: { min: 640 },
                        height: { min: 480 }
                    }
                },
                decoder: {
                    workers: 2,
                    readers: [
                        "code_128_reader",
                        "ean_reader",
                        "upc_reader",
                        "qr_reader",
                        "code_39_reader",
                        "code_93_reader",
                        "ean_8_reader",
                        "upc_e_reader"
                    ]
                }
            };

            Quagga.init(config, (err) => {
                if (err) {
                    console.error("❌ Quagga error:", err);
                    alert("❌ Gagal akses kamera");
                    document.getElementById("permission").style.display = "flex";
                    return;
                }

                isScanning = true;
                console.log("✅ Quagga initialized, scanning dimulai...");
                Quagga.start();

                Quagga.onDetected((result) => {
                    if (!isScanning) return;
                    if (!result.codeResult || !result.codeResult.code) return;

                    const decodedText = result.codeResult.code;
                    console.log("✅ SCAN:", decodedText, "Format:", result.codeResult.format);

                    isScanning = false;

                    if (window.opener) {
                        window.opener.postMessage({
                            type: "SCAN_RESULT",
                            text: decodedText,
                            format: result.codeResult.format,
                            targetId: targetId || null
                        }, "*");
                    }

                    if (navigator.vibrate) navigator.vibrate(200);

                    Quagga.stop();
                    setTimeout(() => window.close(), 500);
                isScanning) {
                Quagga.stop();
            }
            window.close();       window.close();
                }).catch(() => {
                    window.close();
                });
            } else {
                window.close();
            }
        }
    </script>

</body>

</html>
