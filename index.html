<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #0b1220;
            color: white;
        }

        /* HEADER */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            background: #0f172a;
            border-bottom: 1px solid #1f2937;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        button {
            border: none;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn {
            background: #1f2937;
            color: white;
        }

        .btn.active {
            background: #06b6d4;
            color: black;
        }

        .close {
            background: #ef4444;
            color: white;
        }

        /* SCANNER */
        #scanner {
            position: fixed;
            top: 56px;
            bottom: 0;
            left: 0;
            right: 0;
        }

        /* FOCUS BOX */
        .box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 120px;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            pointer-events: none;
        }

        /* RESULT */
        .result {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: #111827;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            word-break: break-all;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="title">Scanner</div>

        <div class="actions">
            <button id="qrBtn" class="btn active">QR</button>
            <button id="barBtn" class="btn">BARCODE</button>
            <button id="closeBtn" class="close">✕</button>
        </div>
    </div>

    <div id="scanner"></div>
    <div class="box"></div>
    <div class="result" id="result">Menunggu scan...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get("target");

        let mode = "qr";
        let qrScanner = null;
        let isScanning = false;
        let lastCode = null;
        let scanBuffer = [];
        let detectedHandler = null;

        /* START */
        window.addEventListener("load", startScanner);

        /* SWITCH MODE */
        document.getElementById("qrBtn").onclick = () => setMode("qr");
        document.getElementById("barBtn").onclick = () => setMode("barcode");
        document.getElementById("closeBtn").onclick = closeScanner;

        function setMode(m) {
            if (mode === m) return;

            mode = m;

            document.getElementById("qrBtn").classList.toggle("active", m === "qr");
            document.getElementById("barBtn").classList.toggle("active", m === "barcode");

            startScanner();
        }

        /* START SCANNER */
        function startScanner() {
            stopAll();

            lastCode = null;
            scanBuffer = [];
            document.getElementById("result").innerText = "Menunggu scan...";

            if (mode === "qr") startQR();
            else startBarcode();
        }

        /* QR MODE */
        function startQR() {
            qrScanner = new Html5Qrcode("scanner");

            Html5Qrcode.getCameras().then(() => {

                qrScanner.start(
                    { facingMode: "environment" },
                    {
                        fps: 10,
                        qrbox: { width: 320, height: 320 }
                    },
                    (text) => handleResult(text),
                    () => { }
                );

                isScanning = true;

            }).catch(() => {
                document.getElementById("result").innerText = "❌ Kamera error";
            });
        }

        /* BARCODE MODE */
        function startBarcode() {

            const config = {
                inputStream: {
                    type: "LiveStream",
                    target: document.querySelector("#scanner"),
                    constraints: {
                        facingMode: "environment",
                        width: { min: 1280 },
                        height: { min: 720 }
                    }
                },
                locator: {
                    patchSize: "small",
                    halfSample: false
                },
                numOfWorkers: 2,
                decoder: {
                    readers: [
                        "code_128_reader",
                        "ean_reader",
                        "ean_8_reader",
                        "upc_reader"
                    ]
                },
                locate: true
            };

            Quagga.init(config, function (err) {
                if (err) {
                    document.getElementById("result").innerText = "❌ Kamera error";
                    return;
                }

                Quagga.start();
                isScanning = true;

                detectedHandler = function (res) {

                    if (!isScanning || !res.codeResult) return;

                    const code = res.codeResult.code;

                    // 🔥 FILTER ERROR
                    if (res.codeResult.decodedCodes) {
                        const errors = res.codeResult.decodedCodes
                            .filter(x => x.error !== undefined)
                            .map(x => x.error);

                        const avgError = errors.reduce((a, b) => a + b, 0) / errors.length;

                        if (avgError > 0.30) return;
                    }

                    if (code.length < 8) return;

                    scanBuffer.push(code);
                    if (scanBuffer.length > 6) scanBuffer.shift();

                    const count = scanBuffer.filter(x => x === code).length;

                    if (count >= 3) {
                        handleResult(code);
                        scanBuffer = [];
                    }
                };

                Quagga.onDetected(detectedHandler);
            });
        }

        /* HANDLE RESULT */
        function handleResult(code) {
            if (code === lastCode) return;

            lastCode = code;

            document.getElementById("result").innerText = "✅ " + code;

            if (window.opener) {
                window.opener.postMessage({
                    type: "SCAN_RESULT",
                    text: code,
                    targetId: targetId || null,
                    mode: mode
                }, "*");
            }

            if (navigator.vibrate) navigator.vibrate(200);

            stopAll();
            setTimeout(() => window.close(), 500);
        }

        /* STOP ALL */
        function stopAll() {
            isScanning = false;

            if (qrScanner) {
                try {
                    qrScanner.stop();
                    qrScanner.clear();
                } catch (e) { }
                qrScanner = null;
            }

            if (typeof Quagga !== "undefined") {
                try {
                    if (detectedHandler) {
                        Quagga.offDetected(detectedHandler);
                        detectedHandler = null;
                    }
                    Quagga.stop();
                } catch (e) { }
            }
        }

        /* CLOSE */
        function closeScanner() {
            stopAll();
            window.close();
        }
    </script>

</body>

</html>
