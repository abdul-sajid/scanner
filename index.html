<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #0b1220;
            color: white;
        }

        /* TOP BAR */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            background: #0f172a;
            border-bottom: 1px solid #1f2937;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        button {
            border: none;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn {
            background: #1f2937;
            color: white;
        }

        .btn.active {
            background: #06b6d4;
            color: black;
        }

        .close {
            background: #ef4444;
            color: white;
        }

        /* SCANNER AREA */
        #scanner {
            position: fixed;
            top: 56px;
            bottom: 0;
            left: 0;
            right: 0;
        }

        /* CENTER BOX */
        .box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 260px;
            height: 140px;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            pointer-events: none;
        }

        /* RESULT */
        .result {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: #111827;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            word-break: break-all;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="title">Scanner</div>

        <div class="actions">
            <button id="qrBtn" class="btn active">QR</button>
            <button id="barBtn" class="btn">BARCODE</button>
            <button id="closeBtn" class="close">✕</button>
        </div>
    </div>

    <div id="scanner"></div>
    <div class="box"></div>
    <div class="result" id="result">Menunggu scan...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get("target");

        let mode = "qr"; // 'qr' or 'barcode'
        let qrScanner = null;
        let lastCode = null;
        let isScanning = false;
        let scanBuffer = [];
        let detectedHandler = null;
        
        // AUTO START
        window.addEventListener("load", () => {
            startScanner();
        });

        function startScanner() {
            console.log('Starting scanner in mode:', mode);
            stopAll();

            lastCode = null;
            isScanning = false;
            document.getElementById("result").innerText = "Menunggu scan...";

            if (mode === "qr") {
                startQRMode();
            } else {
                startBarcodeMode();
            }
        }

        /* QR MODE - using html5-qrcode */
        function startQRMode() {
            qrScanner = new Html5Qrcode("scanner");

            Html5Qrcode.getCameras().then(() => {

                qrScanner.start(
                    { facingMode: "environment" },
                    {
                        fps: 10,
                        qrbox: { width: 280, height: 280 } // jangan terlalu kecil
                        // ❌ HAPUS formatsToSupport → ini bikin gagal detect di beberapa HP
                    },

                    (decodedText) => {
                        handleResult(decodedText);
                    },

                    () => { }
                );

                isScanning = true;

            }).catch(err => {
                document.getElementById("result").innerText = "❌ Kamera error";
            });
        }

        /* BARCODE MODE - using quagga2 */
        function startBarcodeMode() {

            const config = {
                inputStream: {
                    type: "LiveStream",
                    target: document.querySelector("#scanner"),
                    constraints: {
                        facingMode: "environment",
                        width: { min: 640 },
                        height: { min: 480 }
                    }
                },

                locator: {
                    patchSize: "medium", // jangan terlalu besar
                    halfSample: true     // lebih ringan & stabil
                },

                numOfWorkers: 2,

                decoder: {
                    readers: [
                        "code_128_reader",
                        "ean_reader",
                        "ean_8_reader",
                        "upc_reader"
                    ]
                },

                locate: true
            };

            Quagga.init(config, function (err) {
                if (err) {
                    document.getElementById("result").innerText = "❌ Kamera error";
                    return;
                }

                Quagga.start();
                isScanning = true;

                // 🔥 PENTING: simpan handler
                detectedHandler = function (res) {

                    if (!isScanning || !res.codeResult) return;

                    const code = res.codeResult.code;

                    // buffer ringan
                    scanBuffer.push(code);
                    if (scanBuffer.length > 4) scanBuffer.shift();

                    const count = scanBuffer.filter(x => x === code).length;

                    // cukup 2x sama
                    if (count >= 2) {
                        handleResult(code);
                        scanBuffer = [];
                    }
                };

                Quagga.onDetected(detectedHandler);
            });
        }
        /* SCAN SUCCESS HANDLER */
        function onScanSuccess(code) {
            if (code === lastCode) return;
            lastCode = code;
            isScanning = true; // Prevent duplicate scans

            console.log('✅ Scan result:', code);
            document.getElementById("result").innerText = "✅ " + code;

            if (window.opener) {
                window.opener.postMessage({
                    type: "SCAN_RESULT",
                    text: code,
                    targetId: targetId || null,
                    mode: mode
                }, "*");
            }

            if (navigator.vibrate) navigator.vibrate(200);

            stopAll();
            setTimeout(() => {
                try { window.close(); } catch (e) { }
            }, 500);
        }


        function handleResult(code) {
            if (code === lastCode) return;

            lastCode = code;

            document.getElementById("result").innerText = "✅ " + code;

            if (window.opener) {
                window.opener.postMessage({
                    type: "SCAN_RESULT",
                    text: code,
                    targetId: targetId || null,
                    mode: mode
                }, "*");
            }

            if (navigator.vibrate) navigator.vibrate(200);

            stopAll();

            setTimeout(() => window.close(), 500);
        }
        /* STOP ALL SCANNERS */
        function stopAll() {
            isScanning = false;

            if (qrScanner) {
                try {
                    qrScanner.stop();
                    qrScanner.clear();
                } catch (e) { }
                qrScanner = null;
            }

            if (typeof Quagga !== "undefined") {
                try {
                    if (detectedHandler) {
                        Quagga.offDetected(detectedHandler);
                        detectedHandler = null;
                    }
                    Quagga.stop();
                } catch (e) { }
            }
        }

        /* SWITCH MODE */
        function setMode(m) {
            if (m === mode) return; // Already in this mode
            console.log('Switching to mode:', m);

            mode = m;

            // Update button styles
            document.getElementById("qrBtn").classList.remove("active");
            document.getElementById("barBtn").classList.remove("active");
            if (m === "qr") {
                document.getElementById("qrBtn").classList.add("active");
            } else {
                document.getElementById("barBtn").classList.add("active");
            }

            // Restart scanner with new mode
            setTimeout(() => {
                startScanner();
            }, 300);
        }

        /* CLOSE SCANNER */
        function closeScanner() {
            console.log('Closing scanner...');
            stopAll();
            try {
                window.close();
            } catch (e) {
                document.getElementById("result").innerText = "⚠️ Tekan BACK untuk keluar";
            }
        }

        // Attach button event listeners
        setTimeout(() => {
            const qrBtn = document.getElementById('qrBtn');
            const barBtn = document.getElementById('barBtn');
            const closeBtn = document.getElementById('closeBtn');

            if (qrBtn) qrBtn.addEventListener('click', () => setMode('qr'));
            if (barBtn) barBtn.addEventListener('click', () => setMode('barcode'));
            if (closeBtn) closeBtn.addEventListener('click', closeScanner);

            console.log('Button listeners attached');
        }, 100);
    </script>

</body>

</html>
