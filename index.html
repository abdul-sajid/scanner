<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #0b1220;
            color: white;
        }

        /* TOP BAR */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            background: #0f172a;
            border-bottom: 1px solid #1f2937;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        button {
            border: none;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn {
            background: #1f2937;
            color: white;
        }

        .btn.active {
            background: #06b6d4;
            color: black;
        }

        .close {
            background: #ef4444;
            color: white;
        }

        /* SCANNER AREA */
        #scanner {
            position: fixed;
            top: 56px;
            bottom: 0;
            left: 0;
            right: 0;
        }

        /* CENTER BOX */
        .box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 260px;
            height: 140px;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            pointer-events: none;
        }

        /* RESULT */
        .result {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: #111827;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            word-break: break-all;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="title">Scanner</div>

        <div class="actions">
            <button id="qrBtn" class="btn active" onclick="setMode('qr')">QR</button>
            <button id="barBtn" class="btn" onclick="setMode('barcode')">BARCODE</button>
            <button class="close" onclick="closeScanner()">✕</button>
        </div>
    </div>

    <div id="scanner"></div>
    <div class="box"></div>
    <div class="result" id="result">Menunggu scan...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get("target");

        let mode = "qr";
        let qrScanner = null;
        let lastCode = null;
        let isRunning = false;

        /* SWITCH MODE */
        function setMode(m) {
            mode = m;

            document.getElementById("qrBtn").classList.remove("active");
            document.getElementById("barBtn").classList.remove("active");

            if (m === "qr") document.getElementById("qrBtn").classList.add("active");
            else document.getElementById("barBtn").classList.add("active");

            stopAll();
            startScanner();
        }

        /* STOP ALL */
        function stopAll() {
            if (qrScanner) {
                qrScanner.stop().catch(() => { });
                qrScanner.clear().catch(() => { });
                qrScanner = null;
            }

            if (typeof Quagga !== "undefined") {
                try { Quagga.stop(); } catch (e) { }
            }

            isRunning = false;
        }

        /* START */
        window.addEventListener("load", startScanner);

        function startScanner() {
            stopAll();
            lastCode = null;

            document.getElementById("result").innerText = "Menunggu scan...";

            if (mode === "qr") startQR();
            else startBarcode();
        }

        /* QR MODE */
        function startQR() {
            qrScanner = new Html5Qrcode("scanner");

            Html5Qrcode.getCameras().then(() => {
                qrScanner.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: 250 },
                    (text) => handleResult(text),
                    () => { }
                );
                isRunning = true;
            });
        }

        /* BARCODE MODE */
        function startBarcode() {

            const config = {
                inputStream: {
                    type: "LiveStream",
                    target: document.getElementById("scanner"),
                    constraints: {
                        facingMode: "environment"
                    }
                },
                decoder: {
                    readers: [
                        "ean_reader",
                        "ean_8_reader",
                        "upc_reader",
                        "upc_e_reader",
                        "code_128_reader",
                        "code_39_reader"
                    ]
                },
                locate: true
            };

            Quagga.init(config, function (err) {
                if (err) {
                    document.getElementById("result").innerText = "Camera error";
                    return;
                }

                Quagga.start();
                isRunning = true;

                Quagga.onDetected(function (res) {
                    if (!isRunning) return;

                    const code = res.codeResult.code;
                    handleResult(code);
                });
            });
        }

        /* RESULT HANDLER */
        function handleResult(code) {
            if (code === lastCode) return;
            lastCode = code;

            document.getElementById("result").innerText = code;

            if (window.opener) {
                window.opener.postMessage({
                    type: "SCAN_RESULT",
                    text: code,
                    targetId: targetId || null,
                    mode: mode
                }, "*");
            }

            if (navigator.vibrate) navigator.vibrate(150);

            setTimeout(() => window.close(), 500);
        }

        /* CLOSE */
        function closeScanner() {
            stopAll();
            window.close();
        }
    </script>

</body>

</html>
