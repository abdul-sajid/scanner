<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #0b1220;
            color: white;
        }

        /* TOP BAR */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            background: #0f172a;
            border-bottom: 1px solid #1f2937;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        button {
            border: none;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .btn {
            background: #1f2937;
            color: white;
        }

        .btn.active {
            background: #06b6d4;
            color: black;
        }

        .close {
            background: #ef4444;
            color: white;
        }

        /* SCANNER AREA */
        #scanner {
            position: fixed;
            top: 56px;
            bottom: 0;
            left: 0;
            right: 0;
        }

        /* CENTER BOX */
        .box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 260px;
            height: 140px;
            transform: translate(-50%, -50%);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            pointer-events: none;
        }

        /* RESULT */
        .result {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: #111827;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            word-break: break-all;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="title">Scanner</div>

        <div class="actions">
            <button id="qrBtn" class="btn active">QR</button>
            <button id="barBtn" class="btn">BARCODE</button>
            <button id="closeBtn" class="close">✕</button>
        </div>
    </div>

    <div id="scanner"></div>
    <div class="box"></div>
    <div class="result" id="result">Menunggu scan...</div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get("target");

        let scanner = null;
        let lastCode = null;
        let isScanning = false;

        // AUTO START
        window.addEventListener("load", () => {
            startScanning();
        });

        function startScanning() {
            console.log('Starting scanner...');
            
            if (scanner) {
                try {
                    scanner.stop().catch(() => {});
                    scanner.clear().catch(() => {});
                } catch (e) {}
                scanner = null;
            }

            lastCode = null;
            isScanning = false;
            document.getElementById("result").innerText = "Menunggu scan...";

            scanner = new Html5Qrcode("scanner");

            Html5Qrcode.getCameras()
                .then(devices => {
                    if (!devices || !devices.length) {
                        document.getElementById("result").innerText = "❌ Kamera tidak ditemukan";
                        return;
                    }

                    console.log('Camera found, starting...');

                    scanner.start(
                        { facingMode: "environment" },
                        {
                            fps: 15,
                            qrbox: 250,
                            formatsToSupport: [
                                Html5QrcodeSupportedFormats.QR_CODE,
                                Html5QrcodeSupportedFormats.CODE_128,
                                Html5QrcodeSupportedFormats.CODE_39,
                                Html5QrcodeSupportedFormats.EAN_13,
                                Html5QrcodeSupportedFormats.EAN_8,
                                Html5QrcodeSupportedFormats.UPC_A,
                                Html5QrcodeSupportedFormats.UPC_E
                            ]
                        },
                        (decodedText) => {
                            if (isScanning) return;
                            if (decodedText === lastCode) return;

                            lastCode = decodedText;
                            isScanning = true;
                            console.log('✅ Scan result:', decodedText);

                            document.getElementById("result").innerText = "✅ " + decodedText;

                            if (window.opener) {
                                window.opener.postMessage({
                                    type: "SCAN_RESULT",
                                    text: decodedText,
                                    targetId: targetId || null
                                }, "*");
                            }

                            if (navigator.vibrate) navigator.vibrate(200);

                            scanner.stop().catch(() => {});
                            setTimeout(() => {
                                try { window.close(); } catch (e) {}
                            }, 500);
                        },
                        () => {} // ignore errors
                    );

                    isScanning = true;
                    console.log('Scanner started successfully');
                })
                .catch(err => {
                    console.error('Camera error:', err);
                    document.getElementById("result").innerText = "❌ " + err.message;
                });
        }

        function closeScanner() {
            console.log('Closing...');
            if (scanner) {
                try {
                    scanner.stop().catch(() => {});
                    scanner.clear().catch(() => {});
                } catch (e) {}
            }
            try { window.close(); } catch (e) {
                document.getElementById("result").innerText = "⚠️ Tekan BACK untuk keluar";
            }
        }

        function setMode(m) {
            // Mode switch disabled - using unified scanner
            console.log('Mode requested (ignored):', m);
        }

        // Button event listeners
        setTimeout(() => {
            const closeBtn = document.getElementById('closeBtn');
            if (closeBtn) closeBtn.addEventListener('click', closeScanner);
        }, 100);
    </script>

</body>

</html>
